
<style>
  *{box-sizing:border-box}
  .wrap{max-width:840px;margin:0 auto;padding:1rem}
  .main-heading{font-size:20px;font-weight:500;color:var(--color-text-primary);margin:0 0 1.25rem;text-align:center}
  .section-label{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
  .tab-bar{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;padding:4px}
  .tab{font-size:14px;padding:7px 16px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
  .tab.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
  .tab:hover:not(.active){background:var(--color-background-secondary);color:var(--color-text-primary)}
  .panel{display:none}.panel.active{display:block}
  .info-card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-top:1rem;font-size:14px;line-height:1.65;color:var(--color-text-primary);border:.5px solid var(--color-border-tertiary);min-height:60px}
  .harmony-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .harmony-card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);padding:.75rem 1rem;cursor:pointer;transition:border-color .15s}
  .harmony-card:hover,.harmony-card.active{border-color:var(--color-border-primary)}
  .harmony-card h4{font-size:14px;font-weight:500;margin:0 0 5px}
  .harmony-card p{font-size:13px;color:var(--color-text-secondary);margin:0 0 8px;line-height:1.5}
  .harmony-swatches{display:flex;gap:5px}
  .hswatch{flex:1;height:28px;border-radius:4px}
  .temp-split{display:flex;gap:1px;border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1rem}
  .temp-half{flex:1;padding:1rem;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .temp-half p{font-size:13px;margin:0;line-height:1.5;text-align:center}
  .temp-half h3{font-size:15px;font-weight:500;margin:0}
  .mix-dot{width:48px;height:48px;border-radius:50%;border:.5px solid var(--color-border-tertiary)}
  .mix-label{font-size:13px;color:var(--color-text-secondary);text-align:center;margin-top:4px}
  .lang-bar{display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;gap:8px}
  .lang-bar label{font-size:13px;color:var(--color-text-secondary)}
  .lang-bar select{font-size:14px;padding:5px 10px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer}
  .slider-row{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
  .slider-row label{font-size:14px;color:var(--color-text-secondary);min-width:64px}
  .slider-row span{font-size:14px;font-weight:500;min-width:38px;text-align:right}
  .assoc-row{display:flex;align-items:center;gap:10px}
  .assoc-dot{width:28px;height:28px;border-radius:6px;flex-shrink:0}
  .assoc-name{font-size:14px;font-weight:500}
  .assoc-mood{font-size:13px;color:var(--color-text-secondary);margin-left:8px}
  /* Dark mode: only set page background to black and text to white */
  html.dark-mode{background:#000;color:#fff}
  html.dark-mode *{color:#fff !important}
</style>

<div class="wrap">

<h2 class="main-heading" id="main-heading"></h2>

<div class="lang-bar">
  <label id="lang-label">Language</label>
  <select id="lang-select" onchange="setLang(this.value)">
    <option value="en">EN</option>
    <option value="fr">FR</option>
    <option value="de">DE</option>
  </select>
  <label style="margin-left:8px;display:flex;align-items:center;gap:6px">
    <input type="checkbox" id="dark-toggle" onchange="setDarkMode(this.checked)"> Dark
  </label>
</div>

<div class="tab-bar" id="tab-bar"></div>

<div class="panel active" id="panel-wheel">
  <div class="section-label" id="lbl-wheel-title"></div>
  <div style="position:relative;width:280px;height:280px;margin:0 auto 1rem">
    <svg id="wheel-svg" width="280" height="280" viewBox="0 0 280 280"></svg>
    <div id="wheel-center" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;border:.5px solid var(--color-border-tertiary);background:var(--color-background-primary);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-secondary);text-align:center;cursor:pointer;transition:background .2s;line-height:1.3"></div>
  </div>
  <div class="info-card" id="wheel-info"></div>
</div>

<div class="panel" id="panel-harmony">
  <div class="section-label" id="lbl-harmony-title"></div>
  <div class="harmony-grid" id="harmony-grid"></div>
  <div class="info-card" id="harmony-info"></div>
</div>

<div class="panel" id="panel-temperature">
  <div class="section-label" id="lbl-temp-title"></div>
  <div class="temp-split">
    <div class="temp-half" style="background:linear-gradient(135deg,#E85D24,#F2A623,#D4537E)">
      <h3 id="temp-warm-h" style="color:#4A1B0C"></h3>
      <p id="temp-warm-p" style="color:#711203"></p>
    </div>
    <div class="temp-half" style="background:linear-gradient(135deg,#185FA5,#1D9E75,#534AB7)">
      <h3 id="temp-cool-h" style="color:#E6F1FB"></h3>
      <p id="temp-cool-p" style="color:#B5D4F4"></p>
    </div>
  </div>
  <div class="section-label" id="lbl-temp-assoc"></div>
  <div id="temp-associations" style="display:flex;flex-direction:column;gap:8px"></div>
  <div class="info-card" id="temp-note"></div>
</div>

<div class="panel" id="panel-value">
  <div class="section-label" id="lbl-value-title"></div>
  <div class="slider-row">
    <label id="lbl-hue"></label>
    <input type="range" min="0" max="360" value="220" id="val-hue" step="1" oninput="updateValue()">
    <span id="val-hue-out">220\u00b0</span>
  </div>
  <div id="value-bars" style="display:flex;align-items:flex-end;gap:6px;justify-content:center;height:140px;margin:.5rem 0"></div>
  <div style="display:flex;justify-content:space-between;padding:0 4px;margin-bottom:1.5rem">
    <span style="font-size:12px;color:var(--color-text-tertiary)" id="lbl-shade"></span>
    <span style="font-size:12px;color:var(--color-text-tertiary)" id="lbl-tint"></span>
  </div>
  <div class="section-label" id="lbl-sat-title"></div>
  <div class="slider-row">
    <label id="lbl-hue2"></label>
    <input type="range" min="0" max="360" value="220" id="sat-hue" step="1" oninput="updateSat()">
    <span id="sat-hue-out">220\u00b0</span>
  </div>
  <div id="sat-bars" style="display:flex;align-items:flex-end;gap:6px;justify-content:center;height:100px;margin:.5rem 0"></div>
  <div style="display:flex;justify-content:space-between;padding:0 4px">
    <span style="font-size:12px;color:var(--color-text-tertiary)" id="lbl-sat-low"></span>
    <span style="font-size:12px;color:var(--color-text-tertiary)" id="lbl-sat-high"></span>
  </div>
</div>

<div class="panel" id="panel-mixing">
  <div class="section-label" id="lbl-mix-title"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem">
    <div>
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:6px" id="lbl-color-a"></div>
      <input type="range" min="0" max="360" value="0" id="mix-a" step="1" oninput="updateMix()" style="width:100%">
    </div>
    <div>
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:6px" id="lbl-color-b"></div>
      <input type="range" min="0" max="360" value="120" id="mix-b" step="1" oninput="updateMix()" style="width:100%">
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;justify-content:center">
    <div><div class="mix-dot" id="mix-dot-a"></div><div class="mix-label" id="mix-name-a"></div></div>
    <div style="font-size:22px;color:var(--color-text-tertiary)">+</div>
    <div><div class="mix-dot" id="mix-dot-b"></div><div class="mix-label" id="mix-name-b"></div></div>
    <div style="font-size:22px;color:var(--color-text-tertiary)">=</div>
    <div><div class="mix-dot" id="mix-dot-out"></div><div class="mix-label" id="mix-name-out"></div></div>
  </div>
  <div class="section-label" style="margin-top:1.5rem" id="lbl-primary-title"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="harmony-card">
      <h4 id="ryb-title"></h4>
      <p id="ryb-desc"></p>
      <div class="harmony-swatches">
        <div class="hswatch" style="background:#D42B2B"></div>
        <div class="hswatch" style="background:#F2C12E"></div>
        <div class="hswatch" style="background:#2B4BD4"></div>
      </div>
    </div>
    <div class="harmony-card">
      <h4 id="rgb-title"></h4>
      <p id="rgb-desc"></p>
      <div class="harmony-swatches">
        <div class="hswatch" style="background:#E22222"></div>
        <div class="hswatch" style="background:#22E222"></div>
        <div class="hswatch" style="background:#2222E2"></div>
      </div>
    </div>
  </div>
</div>

</div>

const panelIds=['wheel','harmony','temperature','value','mixing'];
let currentLang='en';
let currentPanel='wheel';
let wheelClicked=false;

function t(){return LANGS[currentLang];}

function hueToName(h){return t().hues[Math.round(h/30)%12].name;}

function hueToRgb(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1));};
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}

function drawWheel(){
  const svg=document.getElementById('wheel-svg');
  let html='';
  for(let i=0;i<72;i++){
    const a1=(i/72)*360-90,a2=((i+1)/72)*360-90;
    const hue=(i/72)*360;
    const cx=140,cy=140,r=125,inner=65;
    const p=(a,rad)=>{const r2=a*Math.PI/180;return[cx+rad*Math.cos(r2),cy+rad*Math.sin(r2)];};
    const[x1,y1]=p(a1,r),[x2,y2]=p(a2,r),[x3,y3]=p(a2,inner),[x4,y4]=p(a1,inner);
    const d=`M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} L${x3},${y3} A${inner},${inner} 0 0,0 ${x4},${y4} Z`;
    html+=`<path d="${d}" fill="hsl(${hue},80%,55%)" stroke="none" style="cursor:pointer;transition:opacity .15s" onmouseenter="this.style.opacity='.75'" onmouseleave="this.style.opacity='1'" onclick="onWheelClick(${Math.round(hue)})"/>`;
  }
  svg.innerHTML=html;
}

function onWheelClick(hue){
  wheelClicked=true;
  const idx=Math.round(hue/30)%12;
  const info=t().hues[idx];
  const center=document.getElementById('wheel-center');
  center.style.background=`hsl(${hue},70%,55%)`;
  center.style.color=`hsl(${hue},30%,20%)`;
  center.style.fontSize='11px';
  center.innerHTML=info.name;
  document.getElementById('wheel-info').innerHTML=`<strong>${info.name}</strong> \u2014 ${info.desc}`;
}

function buildTabs(){
  const bar=document.getElementById('tab-bar');
  bar.innerHTML='';
  t().tabs.forEach((label,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(panelIds[i]===currentPanel?' active':'');
    btn.textContent=label;
    btn.onclick=()=>showPanel(panelIds[i]);
    bar.appendChild(btn);
  });
}

function buildHarmonies(){
  const grid=document.getElementById('harmony-grid');
  grid.innerHTML='';
  const harmonyHues=[[0,180],[200,220,240],[0,120,240],[0,150,210],[0,90,180,270],[220]];
  const harSats=[[null,null],[null,null,null],[null,null,null],[null,null,null],[null,null,null,null],[100,70,40,20]];
  t().harmonies.forEach((h,i)=>{
    const swatches=harmonyHues[i].map((hue,j)=>{
      const sat=harSats[i][j]||70;
      const lit=harSats[i][j]?[60,50,55,65][j]:55;
      return`<div class="hswatch" style="background:hsl(${hue},${sat}%,${lit}%)"></div>`;
    }).join('');
    const card=document.createElement('div');
    card.className='harmony-card';
    card.innerHTML=`<h4>${h.name}</h4><p>${h.desc}</p><div class="harmony-swatches">${swatches}</div>`;
    card.onclick=()=>{
      document.querySelectorAll('.harmony-card').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      document.getElementById('harmony-info').innerHTML=`<strong>${h.name}</strong> \u2014 ${t().harmonies[i].use}`;
    };
    grid.appendChild(card);
  });
}

function buildTempAssoc(){
  const wrap=document.getElementById('temp-associations');
  wrap.innerHTML='';
  t().assoc.forEach(a=>{
    const row=document.createElement('div');
    row.className='assoc-row';
    row.innerHTML=`<div class="assoc-dot" style="background:${a.color}"></div><div><span class="assoc-name">${a.label}</span><span class="assoc-mood">${a.mood}</span></div>`;
    wrap.appendChild(row);
  });
}

function updateValue(){
  const h=parseInt(document.getElementById('val-hue').value);
  document.getElementById('val-hue-out').textContent=h+'\u00b0';
  const wrap=document.getElementById('value-bars');
  const lights=[15,25,35,45,55,65,75,85];
  const labels=['10','20','30','40','50','60','70','80'];
  wrap.innerHTML=lights.map((l,i)=>{
    const barH=30+(i/(lights.length-1))*90;
    return`<div style="display:flex;flex-direction:column;align-items:center;flex:1"><div style="background:hsl(${h},65%,${l}%);width:100%;height:${barH}px;border-radius:4px 4px 0 0"></div><div style="font-size:11px;color:var(--color-text-tertiary);margin-top:3px">${labels[i]}%</div></div>`;
  }).join('');
}

function updateSat(){
  const h=parseInt(document.getElementById('sat-hue').value);
  document.getElementById('sat-hue-out').textContent=h+'\u00b0';
  const wrap=document.getElementById('sat-bars');
  const sats=[0,15,30,45,60,75,90,100];
  wrap.innerHTML=sats.map(s=>`<div style="display:flex;flex-direction:column;align-items:center;flex:1"><div style="background:hsl(${h},${s}%,52%);width:100%;height:80px;border-radius:4px 4px 0 0"></div><div style="font-size:11px;color:var(--color-text-tertiary);margin-top:3px">${s}%</div></div>`).join('');
}

function updateMix(){
  const ha=parseInt(document.getElementById('mix-a').value);
  const hb=parseInt(document.getElementById('mix-b').value);
  const[r1,g1,b1]=hueToRgb(ha,75,52);
  const[r2,g2,b2]=hueToRgb(hb,75,52);
  const rm=(r1+r2)>>1,gm=(g1+g2)>>1,bm=(b1+b2)>>1;
  document.getElementById('mix-dot-a').style.background=`hsl(${ha},75%,52%)`;
  document.getElementById('mix-dot-b').style.background=`hsl(${hb},75%,52%)`;
  document.getElementById('mix-dot-out').style.background=`rgb(${rm},${gm},${bm})`;
  document.getElementById('mix-name-a').textContent=hueToName(ha);
  document.getElementById('mix-name-b').textContent=hueToName(hb);
  document.getElementById('mix-name-out').textContent=t().mixOut;
}

function showPanel(name){
  currentPanel=name;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  buildTabs();
}

function applyLang(){
  const L=t();
  document.getElementById('main-heading').textContent=L.heading;
  document.getElementById('lang-label').textContent=L.langLabel;
  document.getElementById('lbl-wheel-title').textContent=L.wheelTitle;
  if(!wheelClicked){
    document.getElementById('wheel-center').innerHTML=L.wheelClick.replace('\n','<br>');
    document.getElementById('wheel-info').textContent=L.wheelDefault;
  }
  document.getElementById('lbl-harmony-title').textContent=L.harmonyTitle;
  document.getElementById('harmony-info').textContent=L.harmonyDefault;
  document.getElementById('lbl-temp-title').textContent=L.tempTitle;
  document.getElementById('temp-warm-h').textContent=L.tempWarmH;
  document.getElementById('temp-warm-p').textContent=L.tempWarmP;
  document.getElementById('temp-cool-h').textContent=L.tempCoolH;
  document.getElementById('temp-cool-p').textContent=L.tempCoolP;
  document.getElementById('lbl-temp-assoc').textContent=L.tempAssocTitle;
  document.getElementById('temp-note').textContent=L.tempNote;
  document.getElementById('lbl-value-title').textContent=L.valueTitle;
  document.getElementById('lbl-hue').textContent=L.hue;
  document.getElementById('lbl-hue2').textContent=L.hue;
  document.getElementById('lbl-shade').textContent=L.shade;
  document.getElementById('lbl-tint').textContent=L.tint;
  document.getElementById('lbl-sat-title').textContent=L.satTitle;
  document.getElementById('lbl-sat-low').textContent=L.satLow;
  document.getElementById('lbl-sat-high').textContent=L.satHigh;
  document.getElementById('lbl-mix-title').textContent=L.mixTitle;
  document.getElementById('lbl-color-a').textContent=L.colorA;
  document.getElementById('lbl-color-b').textContent=L.colorB;
  document.getElementById('lbl-primary-title').textContent=L.primaryTitle;
  document.getElementById('ryb-title').textContent=L.rybTitle;
  document.getElementById('ryb-desc').textContent=L.rybDesc;
  document.getElementById('rgb-title').textContent=L.rgbTitle;
  document.getElementById('rgb-desc').textContent=L.rgbDesc;
  buildTabs();
  buildHarmonies();
  buildTempAssoc();
  updateMix();
}

function setLang(lang){
  currentLang=lang;
  applyLang();
}

function setDarkMode(on){
  if(on) document.documentElement.classList.add('dark-mode');
  else document.documentElement.classList.remove('dark-mode');
  try{localStorage.setItem('darkMode', on? '1' : '0')}catch(e){}
}

// initialize dark mode state from localStorage
try{
  const dm = localStorage.getItem('darkMode');
  if(dm === '1'){
    const cb = document.getElementById('dark-toggle');
    if(cb) cb.checked = true;
    setDarkMode(true);
  }
}catch(e){}

drawWheel();
applyLang();
updateValue();
updateSat();
updateMix();
</script>
